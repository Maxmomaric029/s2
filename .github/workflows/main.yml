name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25b

    - name: Change Permissions (Gradle)
      run: |
        chmod +x ModMenuFF/gradlew || true

    - name: Build APK with Gradle
      working-directory: ModMenuFF
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mod-menu-apk
        path: ModMenuFF/app/build/outputs/apk/release/*.apk
