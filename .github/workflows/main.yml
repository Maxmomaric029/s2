name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Clean CMake cache (fuerza reconfiguración limpia)
        run: |
          rm -rf ModMenuFF/app/.cxx
          rm -rf ModMenuFF/app/build/intermediates/cxx

      - name: Change Permissions
        run: chmod +x ModMenuFF/gradlew || true

      - name: Build APK
        working-directory: ModMenuFF
        env:
          # Usa el SDK de Android ya instalado en el runner, sin NDK externo
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mod-menu-apk
          path: ModMenuFF/app/build/outputs/apk/release/*.apk
